<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-labelledby="title desc">
  <title id="title">Traffic jam</title>
  <desc id="desc">Cars packed closely on a busy road.</desc>
  <rect width="320" height="200" fill="#fff4d6" rx="24"/>
  <rect x="32" y="104" width="256" height="50" rx="18" fill="#353535"/>
  <rect x="48" y="74" width="224" height="18" rx="9" fill="#ffd46c"/>
  <g fill="#d75a4a">
    <rect x="52" y="110" width="54" height="26" rx="8"/>
    <rect x="112" y="110" width="54" height="26" rx="8"/>
    <rect x="172" y="110" width="54" height="26" rx="8"/>
    <rect x="232" y="110" width="36" height="26" rx="8"/>
  </g>
  <g fill="#394f7c">
    <rect x="70" y="142" width="42" height="18" rx="8"/>
    <rect x="128" y="142" width="42" height="18" rx="8"/>
    <rect x="186" y="142" width="42" height="18" rx="8"/>
  </g>
  <text x="160" y="44" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#5a4c2c">Traffic Jam</text>
</svg>
